<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVNIT.DIARY — Academic Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body { background: #020617; font-family: 'Outfit', sans-serif; color: white; }
    .grid-bg {
      background-image: linear-gradient(rgba(251,191,36,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(251,191,36,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .glass { background: #080d18; border: 1px solid #0f172a; border-radius: 16px; transition: border-color 0.2s; }
    .glass:hover { border-color: #1e293b; }
    .g-select {
      background: #0f172a; border: 1px solid #1e293b; color: #e2e8f0; border-radius: 10px;
      padding: 8px 10px; font-family: 'DM Mono', monospace; font-size: 12px; outline: none; width: 100%;
    }
    .cbtn {
      width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; cursor: pointer; border: 1px solid #1e293b; background: #0f172a; color: #64748b;
    }
    .cbtn:hover { border-color: #fbbf24; color: #fbbf24; }
    .att-input {
      background: transparent; border: none; color: white; font-family: 'DM Mono', monospace;
      font-weight: bold; font-size: 20px; text-align: center; width: 50px; outline: none;
    }
    .pbar-track { height: 6px; background: #0f172a; border-radius: 99px; overflow: hidden; }
    .pbar-fill { height: 100%; transition: width 0.4s ease; }
    .s-safe { background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2); color: #34d399; }
    .s-danger { background: rgba(251,113,133,0.07); border: 1px solid rgba(251,113,133,0.2); color: #fb7185; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const GRADE_POINTS = { AA:10, AB:9, BB:8, BC:7, CC:6, CD:5, DD:4, FF:0 };
const GRADE_COLORS = { 10:'#34d399', 9:'#22d3ee', 8:'#22d3ee', 7:'#fcd34d', 6:'#fbbf24', 5:'#f59e0b', 4:'#fb7185', 0:'#f43f5e' };

function App() {
  const [tab, setTab] = useState('grades');
  const [grades, setGrades] = useState(() => JSON.parse(localStorage.getItem('svnit_grades') || '[]'));
  const [attendance, setAttendance] = useState(() => JSON.parse(localStorage.getItem('svnit_att') || '[]'));

  useEffect(() => { localStorage.setItem('svnit_grades', JSON.stringify(grades)); }, [grades]);
  useEffect(() => { localStorage.setItem('svnit_att', JSON.stringify(attendance)); }, [attendance]);

  const calcSGPA = () => {
    let pts=0, cr=0;
    grades.forEach(g => { pts += g.credits * GRADE_POINTS[g.grade]; cr += g.credits; });
    return cr === 0 ? "0.00" : (pts / cr).toFixed(2);
  };

  const getAttStatus = (held, att) => {
    if (held === 0) return { type: 'neutral', msg: 'No data.' };
    const pct = att / held;
    if (pct >= 0.75) {
      const skip = Math.floor((att - 0.75 * held) / 0.75);
      return { type: 'safe', msg: `Safe to skip ${skip} class(es).` };
    }
    const need = Math.ceil((0.75 * held - att) / 0.25);
    return { type: 'danger', msg: `Must attend ${need} more to hit 75%.` };
  };

  return (
    <div className="min-h-screen grid-bg pb-20">
      {/* Navbar */}
      <nav className="sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-md border-b border-[#0f172a] p-4">
        <div className="max-w-3xl mx-auto flex justify-between items-center">
          <div className="flex items-center gap-2">
            <div className="bg-amber-500 p-1.5 rounded-lg text-black font-bold text-xs">SV</div>
            <span className="font-bold tracking-tight">SVNIT<span className="text-amber-500">.</span>DIARY</span>
          </div>
          <div className="flex bg-[#0f172a] p-1 rounded-xl border border-[#1e293b]">
            <button onClick={() => setTab('grades')} className={`px-4 py-1.5 rounded-lg text-xs font-bold ${tab==='grades'?'bg-[#1e293b] text-amber-500':'text-gray-500'}`}>Grades</button>
            <button onClick={() => setTab('attendance')} className={`px-4 py-1.5 rounded-lg text-xs font-bold ${tab==='attendance'?'bg-[#1e293b] text-amber-500':'text-gray-500'}`}>Attendance</button>
          </div>
        </div>
      </nav>

      <main className="max-w-3xl mx-auto p-4 mt-4">
        {tab === 'grades' ? (
          <div className="animate-in fade-in duration-500">
            <div className="glass p-6 mb-6 border-amber-500/20 bg-amber-500/5">
              <p className="text-[10px] uppercase font-mono text-gray-500 tracking-widest">Semester Average</p>
              <div className="text-6xl font-mono font-bold text-amber-500">{calcSGPA()}</div>
            </div>
            <div className="space-y-3">
              {grades.map(g => (
                <div key={g.id} className="glass p-4 grid grid-cols-12 gap-3 items-center">
                  <input className="col-span-6 bg-transparent outline-none text-sm" value={g.name} placeholder="Subject Name..." onChange={e => setGrades(grades.map(x=>x.id===g.id?{...x, name:e.target.value}:x))} />
                  <select className="col-span-3 g-select" value={g.credits} onChange={e => setGrades(grades.map(x=>x.id===g.id?{...x, credits:Number(e.target.value)}:x))}>
                    {[1,2,3,4,5].map(c => <option key={c} value={c}>{c} cr</option>)}
                  </select>
                  <select className="col-span-2 g-select" value={g.grade} onChange={e => setGrades(grades.map(x=>x.id===g.id?{...x, grade:e.target.value}:x))}>
                    {Object.keys(GRADE_POINTS).map(gr => <option key={gr} value={gr}>{gr}</option>)}
                  </select>
                  <button className="col-span-1 text-gray-700 hover:text-red-500" onClick={() => setGrades(grades.filter(x=>x.id!==g.id))}>✕</button>
                </div>
              ))}
              <button className="w-full py-3 border-2 border-dashed border-[#1e293b] text-gray-500 rounded-xl font-bold" onClick={() => setGrades([...grades, {id:Date.now(), name:'', credits:3, grade:'AA'}])}>+ Add Subject</button>
            </div>
          </div>
        ) : (
          <div className="space-y-4">
            {attendance.map(s => {
              const status = getAttStatus(s.held, s.attended);
              const pct = s.held === 0 ? 0 : (s.attended / s.held) * 100;
              return (
                <div key={s.id} className="glass p-5">
                  <div className="flex justify-between items-center mb-4">
                    <input className="bg-transparent font-bold text-lg outline-none w-2/3" value={s.name} placeholder="Subject Name..." onChange={e => setAttendance(attendance.map(x=>x.id===s.id?{...x, name:e.target.value}:x))} />
                    <span className="font-mono font-bold text-xl" style={{color: pct >= 75 ? '#34d399' : '#fb7185'}}>{pct.toFixed(1)}%</span>
                  </div>
                  <div className="pbar-track mb-6">
                    <div className="pbar-fill" style={{width: `${Math.min(100, pct)}%`, background: pct >= 75 ? '#34d399' : '#fb7185'}} />
                  </div>
                  <div className="grid grid-cols-2 gap-4 mb-4">
                    <div className="bg-[#0f172a] p-3 rounded-xl border border-[#1e293b] flex justify-between items-center">
                      <button className="cbtn" onClick={() => setAttendance(attendance.map(x=>x.id===s.id?{...x, held:Math.max(0, x.held-1)}:x))}>−</button>
                      <input type="number" className="att-input" value={s.held} onChange={e => setAttendance(attendance.map(x=>x.id===s.id?{...x, held:Number(e.target.value)}:x))} />
                      <button className="cbtn" onClick={() => setAttendance(attendance.map(x=>x.id===s.id?{...x, held:x.held+1}:x))}>+</button>
                    </div>
                    <div className="bg-[#0f172a] p-3 rounded-xl border border-[#1e293b] flex justify-between items-center">
                      <button className="cbtn" onClick={() => setAttendance(attendance.map(x=>x.id===s.id?{...x, attended:Math.max(0, x.attended-1)}:x))}>−</button>
                      <input type="number" className="att-input" value={s.attended} onChange={e => setAttendance(attendance.map(x=>x.id===s.id?{...x, attended:Number(e.target.value)}:x))} />
                      <button className="cbtn" onClick={() => setAttendance(attendance.map(x=>x.id===s.id?{...x, attended:x.attended+1}:x))}>+</button>
                    </div>
                  </div>
                  <div className={`p-3 rounded-xl text-center text-xs font-mono font-bold ${status.type==='safe'?'s-safe':'s-danger'}`}>{status.msg}</div>
                  <button className="w-full mt-3 text-[10px] text-gray-700 font-bold tracking-widest uppercase" onClick={() => setAttendance(attendance.filter(x=>x.id!==s.id))}>Delete Subject</button>
                </div>
              );
            })}
            <button className="w-full py-4 bg-amber-500 text-black font-bold rounded-xl shadow-lg shadow-amber-500/20" onClick={() => setAttendance([...attendance, {id:Date.now(), name:'', held:0, attended:0}])}>+ Add New Subject</button>
          </div>
        )}
      </main>
      
      {/* Footer References */}
      <footer className="max-w-3xl mx-auto px-4 mt-8 pb-10">
         <p className="font-mono text-[10px] text-[#1e293b] leading-relaxed">
            SGPA = Σ(credits × grade points) ÷ total credits <br/>
            Skip = ⌊(attended − 0.75×held) / 0.75⌋ · Need = ⌈(0.75×held − attended) / 0.25⌉
         </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
